# Model registry — referenced by all workstreams.
# Hydra: configs/models.yaml
#
# Usage:
#   python scripts/run_probes.py model=llama-3.1-8b-instruct

defaults:
  - _self_

models:
  llama-3.1-8b-instruct:
    hf_id: meta-llama/Llama-3.1-8B-Instruct
    hdf5_key: meta-llama_Llama-3.1-8B-Instruct
    family: llama
    n_layers: 32
    n_heads: 32
    n_kv_heads: 8
    hidden_dim: 4096
    head_dim: 128
    is_reasoning: false
    sae_release: fnlp/Llama-3_1-8B-Base-LXR-32x
    sae_caveat: "SAE trained on Base, not Instruct — verify reconstruction loss"

  gemma-2-9b-it:
    hf_id: google/gemma-2-9b-it
    hdf5_key: google_gemma-2-9b-it
    family: gemma
    n_layers: 42
    n_heads: 16
    n_kv_heads: 8
    hidden_dim: 3584
    head_dim: 256
    is_reasoning: false
    sae_release: google/gemma-scope-9b-it-res
    sliding_window: 4096   # Odd layers use sliding window — analyze separately
    has_alternating_attention: true

  r1-distill-llama-8b:
    hf_id: deepseek-ai/DeepSeek-R1-Distill-Llama-8B
    hdf5_key: deepseek-ai_DeepSeek-R1-Distill-Llama-8B
    family: llama
    n_layers: 32
    n_heads: 32
    n_kv_heads: 8
    hidden_dim: 4096
    head_dim: 128
    is_reasoning: true
    sae_release: null   # Try Llama Scope first; train custom if reconstruction fails
    matched_pair_with: llama-3.1-8b-instruct   # The headline comparison

  r1-distill-qwen-7b:
    hf_id: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
    hdf5_key: deepseek-ai_DeepSeek-R1-Distill-Qwen-7B
    family: qwen2
    n_layers: 28
    n_heads: 28
    n_kv_heads: 4
    hidden_dim: 3584
    head_dim: 128
    is_reasoning: true
    sae_release: null

  # --- Ministral-3-8B matched pair (Dec 2025) ---
  # Cleanest comparison: same base, same tokenizer, cascade distillation
  # from Mistral AI. Both Apache 2.0. Instruct vs Reasoning only.
  ministral-3-8b-instruct:
    hf_id: mistralai/Ministral-3-8B-Instruct-2512
    hdf5_key: mistralai_Ministral-3-8B-Instruct-2512
    family: mistral
    n_layers: 32
    n_heads: 32
    n_kv_heads: 8
    hidden_dim: 4096
    head_dim: 128
    is_reasoning: false
    sae_release: null      # No public SAEs yet — train custom or probe-only
    matched_pair_with: ministral-3-8b-reasoning

  ministral-3-8b-reasoning:
    hf_id: mistralai/Ministral-3-8B-Reasoning-2512
    hdf5_key: mistralai_Ministral-3-8B-Reasoning-2512
    family: mistral
    n_layers: 32
    n_heads: 32
    n_kv_heads: 8
    hidden_dim: 4096
    head_dim: 128
    is_reasoning: true
    sae_release: null
    matched_pair_with: ministral-3-8b-instruct
    thinking_format: "<think>...</think>"   # Same convention as R1-Distill

  # --- OLMo-3-7B matched pair (Allen AI) ---
  # Backup for Ministral-3-8B (which requires Mistral3Config unsupported by
  # transformers). Same base model, different post-training. Fully open
  # (data + weights + code), Apache 2.0, standard transformer attention.
  olmo-3-7b-instruct:
    hf_id: allenai/OLMo-3-7B-Instruct
    hdf5_key: allenai_OLMo-3-7B-Instruct
    family: olmo
    is_reasoning: false
    sae_release: null
    matched_pair_with: olmo-3-7b-think

  olmo-3-7b-think:
    hf_id: allenai/OLMo-3-7B-Think
    hdf5_key: allenai_OLMo-3-7B-Think
    family: olmo
    is_reasoning: true
    sae_release: null
    matched_pair_with: olmo-3-7b-instruct
    thinking_format: "<|think_start|>...<|think_end|>"

  # --- OLMo-3-32B matched pair (Allen AI, 32B scale) ---
  # Same family as 7B pair but 4.5x larger. Tests whether S1/S2 signatures
  # scale with model size. 64 layers, 5120 hidden, GQA (40Q/8KV).
  # ~34.4B params, ~69GB BF16 — fits on B200 (180GB) with room for KV cache.
  # NOTE: HF repos use inconsistent naming (Olmo-3.1 vs Olmo-3).
  # Instruct is 3.1 lineage, Think is 3.0 lineage — same base architecture.
  olmo-3-32b-instruct:
    hf_id: allenai/Olmo-3.1-32B-Instruct
    hdf5_key: allenai_Olmo-3.1-32B-Instruct
    family: olmo
    n_layers: 64
    n_heads: 40
    n_kv_heads: 8
    hidden_dim: 5120
    head_dim: 128
    is_reasoning: false
    sae_release: null
    matched_pair_with: olmo-3-32b-think

  olmo-3-32b-think:
    hf_id: allenai/Olmo-3-32B-Think
    hdf5_key: allenai_Olmo-3-32B-Think
    family: olmo
    n_layers: 64
    n_heads: 40
    n_kv_heads: 8
    hidden_dim: 5120
    head_dim: 128
    is_reasoning: true
    sae_release: null
    matched_pair_with: olmo-3-32b-instruct
    thinking_format: "<|think_start|>...<|think_end|>"
