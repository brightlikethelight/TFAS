# Hydra config for the causal-interventions workstream.
#
# Usage:
#   python scripts/run_causal.py
#   python scripts/run_causal.py models=[llama-3.1-8b-instruct]
#   python scripts/run_causal.py alphas=[-1,0,1] top_features_per_layer=1
#
# The ``models`` block from ``configs/models.yaml`` can be pulled in via the
# defaults list to share model metadata (hidden_dim, hf_id, etc.) across
# workstreams. We keep this config self-contained to avoid coupling changes
# in models.yaml to the causal pipeline.

defaults:
  - _self_

# ---- I/O -----------------------------------------------------------------

sae_results_dir: results/sae
benchmark_path: data/benchmark/benchmark.jsonl
output_dir: results/causal

# ---- Reproducibility -----------------------------------------------------

seed: 0

# ---- Models to sweep -----------------------------------------------------

models:
  - llama-3.1-8b-instruct
  - r1-distill-llama-8b

# Optional: override the HuggingFace model ID per key. If omitted, the model
# key is passed directly to AutoModelForCausalLM.from_pretrained(), which
# only works when the key is itself a valid HF id.
models_hf:
  llama-3.1-8b-instruct: meta-llama/Llama-3.1-8B-Instruct
  r1-distill-llama-8b: deepseek-ai/DeepSeek-R1-Distill-Llama-8B
  gemma-2-9b-it: google/gemma-2-9b-it
  r1-distill-qwen-7b: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B

device: cuda:0

# ---- Dose-response grid --------------------------------------------------

alphas: [-5, -3, -1, -0.5, 0, 0.5, 1, 3, 5]

# Number of top differential features per layer to test. The SAE workstream
# ranks features by effect size within each (model, layer); this trims the
# sweep to the K most promising per layer.
top_features_per_layer: 3

# ---- Random-direction control (NON-NEGOTIABLE per CLAUDE.md) -------------

random_control:
  n_directions: 5
  seed: 1

# ---- Capability preservation ---------------------------------------------

capability_eval:
  mmlu_subset_path: data/eval/mmlu_subset.jsonl
  hellaswag_subset_path: data/eval/hellaswag_subset.jsonl
  n_examples_per_eval: 100
  max_acceptable_drop_pp: 2.0

# ---- Generation / scoring --------------------------------------------------

max_new_tokens: 128

# ---- Statistics ----------------------------------------------------------

n_bootstrap: 1000

# ---- Logging -------------------------------------------------------------

logging:
  use_wandb: false
  level: INFO
